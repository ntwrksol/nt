/* Main card */
.login-container {
    background: #ffffff;
    width: 100%;
    max-width: 520px;
    border-radius: 10px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    padding: 30px 35px 25px;
}

/* Header bar */
.header {
    background: #d9d9d9;
    border-radius: 8px;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
}

.header img {
    width: 42px;
}

.header h1 {
    font-size: 28px;
    font-weight: bold;
    color: #000;
}

/* Instructions */
.instructions {
    font-size: 16px;
    color: #000;
    margin-bottom: 10px;
}

/* Verified line */
.verified {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #2e8b1f;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 20px;
}

.verified .dot {
    width: 12px;
    height: 12px;
    background: #2e8b1f;
    border-radius: 50%;
}

/* Inputs */
input[type="email"],
input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    margin-bottom: 12px;
    border: 1px solid #cfcfcf;
    border-radius: 2px;
    font-size: 15px;
    color: #333;
}

input::placeholder {
    color: #8a8a8a;
}

input:focus {
    outline: none;
    border-color: #5b9bd5;
}

/* Button */
.login-button {
    background: #4f8edc;
    color: #ffffff;
    padding: 12px 24px;
    font-size: 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 8px;
}

.login-button:hover {
    background: #3f78bc;
}

/* Security icon */
.security {
    display: flex;
    justify-content: center;
    margin-top: 18px;
}

.security img {
    width: 85px;
}

/* Footer */
.footer {
    text-align: center;
    margin-top: 22px;
    font-size: 14px;
    color: #000;
    font-weight: 600;
}
.logo {
    display: block;
    margin: 0 0 25px 5px;
    width: 250px;
    max-width: 100%;
